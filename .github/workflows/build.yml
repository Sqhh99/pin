name: build

on:
  push:
    branches-ignore:
      - 'gh-pages'
    tags-ignore:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pin-ci

      - name: Clippy
        run: cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Test
        run: cargo test --release --target x86_64-pc-windows-msvc
