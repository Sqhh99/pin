name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pin-release

      - name: Install cargo-wix
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Run tests
        run: cargo test --release --target x86_64-pc-windows-msvc

      - name: Generate license RTF for installer
        shell: pwsh
        run: ./scripts/gen-license-rtf.ps1

      - name: Build MSI installer
        run: cargo wix --no-build --nocapture --target x86_64-pc-windows-msvc

      - name: Stage artifacts
        id: stage
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v',''
          if (-not $version) { $version = "dev" }
          # Branch names like feat/autostart must not contain path separators in filenames.
          $version = $version -replace '[\\/:*?"<>|]', '-'
          New-Item -ItemType Directory -Force dist | Out-Null
          $msi = Get-ChildItem target\wix -Filter *.msi -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $msi) {
            throw "MSI artifact was not found in target\wix"
          }
          $outName = "pin-$version-windows-x64.msi"
          $outPath = Join-Path dist $outName
          Copy-Item $msi.FullName $outPath
          $hash = (Get-FileHash $outPath -Algorithm SHA256).Hash.ToLower()
          "$hash  $outName" | Out-File -FilePath "$outPath.sha256" -Encoding ascii
          Get-ChildItem dist
          "msi_name=$outName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pin-windows-x64
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.msi
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
