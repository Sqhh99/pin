name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pin-release

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Run tests
        run: cargo test --release --target x86_64-pc-windows-msvc

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v',''
          if (-not $version) { $version = "dev" }
          # Sanitize for filename use (branch names like feat/x).
          $version = $version -replace '[\\/:*?"<>|]', '-'
          $iscc = Join-Path "${env:ProgramFiles(x86)}" 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup 6 ISCC.exe not found at $iscc"
          }
          & $iscc /Qp "/DMyAppVersion=$version" installer\pin.iss
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC.exe failed with exit code $LASTEXITCODE"
          }

      - name: Stage artifacts
        id: stage
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist -Filter *.exe -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $setup) {
            throw "Installer .exe was not found in dist"
          }
          $hash = (Get-FileHash $setup.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($setup.Name)" | Out-File -FilePath "$($setup.FullName).sha256" -Encoding ascii
          Get-ChildItem dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pin-windows-x64
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
